<!-- =============================================================================
     app.component.html – Root template: navigation bar + router outlet
     =============================================================================
     The navbar is rendered on every page. The <router-outlet> is the slot where
     Angular inserts the component matched by the current URL.
     ============================================================================= -->

<!-- Bootstrap dark navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Brand / home link -->
    <a class="navbar-brand fw-bold" routerLink="/">
      ⛳ {{ title }}
    </a>

    <!-- Hamburger button shown on small screens -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav links collapse on mobile -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <!-- routerLinkActive adds the Bootstrap 'active' class automatically -->
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            View Shots
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/add"
            routerLinkActive="active"
          >
            Add Shot
          </a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<!-- The matched route's component is rendered here -->
<main class="container page-container">
  <router-outlet></router-outlet>
</main>
